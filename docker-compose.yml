services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loginbook-app
    environment:
      DATABASE_URL: file:/app/data/loginbook.db
      APP_URL: http://localhost:3000
      SESSION_SECRET: replace-with-32-plus-random-bytes
      CSRF_SECRET: replace-with-32-plus-random-bytes
      STORAGE_DRIVER: local
      LOCAL_UPLOAD_DIR: ./uploads
      RUN_DB_PUSH_ON_START: "true"
      RUN_SEED_ON_START: "true"
    ports:
      - "3000:3000"
    volumes:
      - loginbook_data:/app/data
      - loginbook_uploads:/app/uploads

volumes:
  loginbook_data:
  loginbook_uploads:
